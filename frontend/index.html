<!DOCTYPE html>
<html>
<head>
    <title>Blox Value MVP</title>
</head>
<body>

<h1>Trade Test</h1>

<button onclick="testTrade()">Test Trade</button>

<p id="result"></p>

<script>
window.testTrade = function() {
    const API = "https://site-sncl.onrender.com";

    fetch(API + "/trade?item1=dragon&item2=buddha")
    .then(r => r.json())
    .then(d => {
        alert(d.result);
    })
    .catch(err => console.log(err));
}
</script>

</body>
</html>
