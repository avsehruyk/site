<!DOCTYPE html>
<html>
<head>
    <title>Blox Value MVP</title>
</head>
<body>

<h1>Trade Test</h1>

<button onclick="testTrade()">Test Trade</button>

<p id="result"></p>

<script>
const API = "https://site-sncl.onrender.com";

function tradeTest() {
    fetch(API + "/trade?item1=dragon&item2=buddha")
    .then(res => res.json())
    .then(data => {
        alert(
            "RESULT: " + data.result +
            "\nGave: " + data.value_gave +
            "\nGot: " + data.value_got
        );
    })
    .catch(err => {
        alert("Hata: API bağlanamadı");
        console.log(err);
    });
}
</script>

</body>
</html>
